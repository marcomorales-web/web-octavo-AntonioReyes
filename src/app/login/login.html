    <div class="page">

        <section id="login">

            Cafetería
        </h2>

        <form>

            <label for="correo" class="animate__animated animate__fadeInLeft animate__delay-1s">
            Correo:
            </label>
            <input
            class="animate__animated animate__fadeInLeft animate__delay-1s"
            type="text"
            id="correo"
            placeholder="Correo"

            <label for="contrasena" class="animate__animated animate__fadeInLeft animate__delay-2s">

            </label>
            <input
            class="animate__animated animate__fadeInLeft animate__delay-2s"

            <a routerLink="/recuperar">¿Olvidaste tu contraseña?</a>

        </div>

        </section>

    </div>
