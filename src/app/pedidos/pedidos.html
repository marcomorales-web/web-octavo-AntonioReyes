<app-navbar></app-navbar>
<div class="container">
	<!-- code here -->
	<div class="card">
		<div class="card-image">	
			<h2 class="card-heading">
				Ordena
				<small>Tu cafe</small>
			</h2>
		</div>
		<form class="card-form">
			<div class="input">
				<input type="text" class="input-field" required/>
				<label class="input-label">Nombre Completo</label>
			</div>
			<div class="input">
				<input type="text" class="input-field" required/>
				<label class="input-label">Direccion</label>
			</div>
			<div class="input">
				<input type="text" class="input-field" required/>
				<label class="input-label">Comunidad</label>
			</div>
			
			<div class="mos_coffee">
			<div *ngFor="let pedido of pedidos">
			<p>{{pedido.cafe}} - ${{pedido.precio}}</p>
			</div>
			</div>

			<div class="action">
				<button class="action-button">Ordenar</button>
			</div>
		</form>
	</div>
</div>
