<div class="page">  
    <div class="card animate__animated animate__fadeInUp">
    <section id="registro">
        <h2 class="animate__animated animate__fadeInDown animate__delay-1s">
        Regístrate
        </h2>
        <form>
        <label class="animate__animated animate__fadeInLeft animate__delay-2s">
            Nombre:
        </label>
        <input
            class="animate__animated animate__fadeInLeft animate__delay-2s"
            type="text"
            placeholder="Nombre"
            required
        >
        <label class="animate__animated animate__fadeInLeft animate__delay-3s">
            Apellido Paterno:
        </label>
        <input
            class="animate__animated animate__fadeInLeft animate__delay-3s"
            type="text"
            placeholder="Apellido Paterno"
            required
        >

        <label class="animate__animated animate__fadeInLeft animate__delay-4s">
            Apellido Materno:
        </label>
        <input
            class="animate__animated animate__fadeInLeft animate__delay-4s"
            type="text"
            placeholder="Apellido Materno"
            required
        >

        <label class="animate__animated animate__fadeInLeft animate__delay-5s">
            Teléfono:
        </label>
        <input
            class="animate__animated animate__fadeInLeft animate__delay-5s"
            type="text"
            placeholder="Teléfono"
            required
        >

        <label class="animate__animated animate__fadeInLeft animate__delay-6s">
            Correo:
        </label>
        <input
            class="animate__animated animate__fadeInLeft animate__delay-6s"
            type="email"
            placeholder="Correo"
            required
        >

        <label class="animate__animated animate__fadeInLeft animate__delay-7s">
            Contraseña:
        </label>
        <input
            class="animate__animated animate__fadeInLeft animate__delay-7s"
            type="password"
            placeholder="Contraseña"
            required
        >

        <button
            class="animate__animated animate__fadeInUp animate__delay-8s"
            type="button"
        >
            Registrar
        </button>

        </form>

    </section>

    <div class="login-link animate__animated animate__fadeIn animate__delay-9s">
        <span>¿Ya tienes cuenta?</span>
        <a routerLink="/login">Inicia sesión</a>
    </div>

    </div>
</div>
